[blueprint]
name = "rust-code-quality"
version = "1.0"
description = "Improve Rust code quality and maintainability metrics."

[domain]
repo_path = "."
target_files = ["src/**/*.rs", "crates/**/*.rs"]
language = "rust"

[constraints]
max_iterations = 100
timeout_seconds = 300
require_tests_pass = true
min_improvement = 0.01

[metrics]
metrics = [
    { name = "correctness", weight = 0.5, direction = "maximize", description = "Code correctness and safety." },
    { name = "readability", weight = 0.3, direction = "maximize", description = "Ease of understanding and review." },
    { name = "performance", weight = 0.2, direction = "maximize", description = "Runtime and memory efficiency." },
]

[agents]
council_size = 3
debate_rounds = 2
agents = [
    { name = "architect", role = "Software Architect", system_prompt = "You focus on clean, maintainable Rust design.", model = "llama3" },
    { name = "optimizer", role = "Performance Engineer", system_prompt = "You focus on Rust performance improvements.", model = "llama3" },
    { name = "reviewer", role = "Code Reviewer", system_prompt = "You focus on correctness and safety regressions.", model = "llama3" },
]

[models]
models = [
    { name = "llama3", provider = "ollama", endpoint = "http://localhost:11434", temperature = 0.4, max_tokens = 2048 },
]
