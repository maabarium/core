[blueprint]
name = "example-optimizer"
version = "0.1.0"
description = "Example blueprint for optimizing code quality"

[domain]
repo_path = "."
target_files = ["src/**/*.rs"]
language = "rust"

[constraints]
max_iterations = 10
timeout_seconds = 300
require_tests_pass = true
min_improvement = 0.01

[metrics]
metrics = [
    { name = "code_quality", weight = 0.4, direction = "maximize", description = "Overall code quality score" },
    { name = "performance", weight = 0.3, direction = "maximize", description = "Runtime performance score" },
    { name = "maintainability", weight = 0.3, direction = "maximize", description = "Code maintainability score" },
]

[agents]
council_size = 3
debate_rounds = 2
agents = [
    { name = "architect", role = "software architect", system_prompt = "You are a senior software architect focused on clean, maintainable code.", model = "llama3" },
    { name = "optimizer", role = "performance engineer", system_prompt = "You are a performance engineer focused on runtime efficiency.", model = "llama3" },
    { name = "reviewer", role = "code reviewer", system_prompt = "You are a thorough code reviewer focused on correctness and best practices.", model = "llama3" },
]

[models]
models = [
    { name = "llama3", provider = "ollama", endpoint = "http://localhost:11434", temperature = 0.7, max_tokens = 2048 },
]
