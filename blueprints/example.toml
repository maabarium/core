[blueprint]
name = "example-prompt-lab"
version = "0.1.0"
description = "Example blueprint for optimizing the Maabarium prompt and council loop"

[domain]
repo_path = "."
target_files = ["crates/**/*.rs", "docs/**/*.md"]
language = "rust"

[constraints]
max_iterations = 10
timeout_seconds = 300
require_tests_pass = true
min_improvement = 0.01

[metrics]
metrics = [
    { name = "code_quality", weight = 0.4, direction = "maximize", description = "Overall code quality score" },
    { name = "performance", weight = 0.3, direction = "maximize", description = "Runtime performance score" },
    { name = "maintainability", weight = 0.3, direction = "maximize", description = "Code maintainability score" },
]

[agents]
council_size = 3
debate_rounds = 2
agents = [
    { name = "strategist", role = "strategist", system_prompt = "You are a senior software strategist focused on high-signal improvements with measurable upside.", model = "llama3" },
    { name = "critic", role = "critic", system_prompt = "You are an adversarial reviewer focused on regressions, cost, and failure modes.", model = "llama3" },
    { name = "engineer", role = "engineer", system_prompt = "You are a pragmatic engineer who turns council direction into concrete, safe file updates.", model = "llama3" },
]

[models]
assignment = "explicit"
models = [
    { name = "llama3", provider = "ollama", endpoint = "http://localhost:11434", temperature = 0.7, max_tokens = 2048, requests_per_minute = 60 },
]
