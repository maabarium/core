[blueprint]
name = "creator-buddy-prompts"
version = "1.0"
description = "Continuously improve prompt assets for creator workflows."

[domain]
repo_path = "."
target_files = ["prompts/**/*.md"]
language = "markdown"

[constraints]
max_iterations = 100
timeout_seconds = 120
require_tests_pass = false
min_improvement = 0.02

[metrics]
metrics = [
    { name = "actionability", weight = 0.3, direction = "maximize", description = "How actionable is the prompt output?" },
    { name = "specificity", weight = 0.3, direction = "maximize", description = "Does the prompt stay concrete and precise?" },
    { name = "brevity", weight = 0.2, direction = "maximize", description = "Is the prompt concise without losing clarity?" },
    { name = "quality", weight = 0.2, direction = "maximize", description = "Overall quality of the prompt package." },
]

[agents]
council_size = 2
debate_rounds = 1
agents = [
    { name = "prompt-engineer", role = "Prompt Engineer", system_prompt = "You improve prompt clarity and structure.", model = "qwen" },
    { name = "critic", role = "Prompt Critic", system_prompt = "You identify prompt ambiguity and weak instructions.", model = "qwen" },
]

[models]
models = [
    { name = "qwen", provider = "ollama", endpoint = "http://localhost:11434", temperature = 0.6, max_tokens = 1024 },
]
