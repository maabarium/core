[blueprint]
name = "general-research"
version = "1.0"
description = "Research any topic with grounded synthesis, source tracking, and explicit citations for major claims."

[domain]
repo_path = "."
target_files = ["docs/**/*.md", "research/**/*.md", "notes/**/*.md", "reports/**/*.md"]
language = "research"

[constraints]
max_iterations = 40
timeout_seconds = 240
require_tests_pass = false
min_improvement = 0.02

[metrics]
metrics = [
    { name = "factual_grounding", weight = 0.3, direction = "maximize", description = "Claims should remain grounded in verifiable evidence." },
    { name = "citation_coverage", weight = 0.25, direction = "maximize", description = "Major claims should include explicit sources and citations." },
    { name = "source_quality", weight = 0.25, direction = "maximize", description = "The research should prefer credible, diverse, and recent sources when possible." },
    { name = "synthesis_quality", weight = 0.2, direction = "maximize", description = "The final research output should synthesize findings clearly instead of listing disconnected facts." },
]

[agents]
council_size = 3
debate_rounds = 2
agents = [
    { name = "researcher", role = "Lead Researcher", system_prompt = "You gather the best available evidence on the topic, prefer primary or high-quality sources, keep a running list of concrete source URLs, and only propose findings that can be backed by explicit citations. If live search is unavailable, say so and avoid unsupported claims. A runtime note will identify the active search provider; if it is a scraper-backed fallback, treat search results as leads and verify claims against the destination pages before using them.", model = "llama3" },
    { name = "verifier", role = "Source Verifier", system_prompt = "You challenge unsupported claims, missing external URLs, weak source quality, and malformed patch plans. Demand source attribution for every major claim and call out when live internet lookup is unavailable or insufficient. A runtime note will identify the active search provider; if it is a scraper-backed fallback, apply a stricter bar to evidence quality and call out scraper reliability limits when confidence should be reduced.", model = "llama3" },
    { name = "synthesizer", role = "Research Synthesizer", system_prompt = "You turn sourced findings into one narrow markdown brief patch with exact unified diff headers, citations for every major claim, and explicit uncertainty where evidence is weak. Prefer creating or appending a single research file over broad rewrites. If the evidence is too weak, return no patch and explain the gap. A runtime note will identify the active search provider; if it is a scraper-backed fallback and that affects confidence, say so briefly in the research output.", model = "llama3" },
]

[models]
assignment = "explicit"
models = [
    { name = "llama3", provider = "ollama", endpoint = "http://localhost:11434", temperature = 0.35, max_tokens = 3072, requests_per_minute = 30 },
]

[library]
kind = "template"
setup_required = true
template = "general_research"